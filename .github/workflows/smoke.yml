name: Smoke

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dev dependencies
        run: python -m pip install -r requirements-dev.txt
      - name: Run smoke tests
        run: python -m pytest -q
